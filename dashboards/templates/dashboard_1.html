<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Fi Audio Dashboard</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07070a;
            --accent: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0f0;
            --text-dim: #8a8a9a;
            --success: #00f5d4;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(157, 78, 221, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(61, 44, 141, 0.05) 0%, transparent 50%);
        }

        /* Now Playing Section */
        .now-playing {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .track-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(90deg, #fff, #b39ddb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .track-artist {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
        }

        .metadata-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .badge.hires {
            border-color: var(--success);
            color: var(--success);
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.2);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
        }

        .btn-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.4rem;
        }

        .btn-circle:hover {
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            border-color: transparent;
        }

        .btn-circle:active {
            transform: scale(0.9);
        }

        /* Volume Control */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 2rem;
            padding: 0 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        #volume-slider {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
            outline: none;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            border: 2px solid white;
        }

        #volume-value {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            width: 40px;
            color: var(--text-dim);
        }

        /* Seek Bar */
        .seek-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 1rem;
            padding: 0 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        #seek-slider {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        #seek-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            transition: transform 0.1s;
        }

        #seek-slider:active::-webkit-slider-thumb {
            transform: scale(1.3);
        }

        .seek-time {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
            min-width: 38px;
        }

        /* Track List */
        .track-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .track-list {
            max-width: 800px;
            margin: 0 auto;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            margin-bottom: 8px;
            background: var(--glass);
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--glass-border);
        }

        .track-info {
            flex-grow: 1;
        }

        .track-item-title {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .track-item-sub {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .format-tag {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: bold;
            margin-right: 8px;
        }

        /* Media Tabs */
        .media-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 1rem 0;
        }
        
        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        
        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .track-title { font-size: 1.4rem; }
            .btn-circle { width: 50px; height: 50px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <section class="now-playing">
        <h1 id="playing-title" class="track-title">Select a Track</h1>
        <div id="playing-artist" class="track-artist">Ready to Play</div>
        
        <div id="playing-badges" class="metadata-badges">
            <!-- Badges like FLAC, 192kHz injected here -->
        </div>

        <div class="controls">
            <button class="btn-circle" style="background: var(--success); color: black;" onclick="resumeMusic()" title="Resume">▶</button>
            <button class="btn-circle" onclick="pauseMusic()" title="Pause">⏸</button>
            <button class="btn-circle" onclick="stopMusic()" title="Stop">⏹</button>
            <button class="btn-circle" style="background: rgba(255,255,255,0.05)" onclick="refreshList()" title="Refresh">🔄</button>
        </div>

        <div class="volume-container">
            <span>🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="50" oninput="updateVolume(this.value)">
            <span id="volume-value">50%</span>
        </div>

        <!-- Seek Bar -->
        <div class="seek-container">
            <span class="seek-time" id="seek-current">0:00</span>
            <input type="range" id="seek-slider" min="0" max="100" value="0"
                   onmousedown="window.seekDragging=true"
                   ontouchstart="window.seekDragging=true"
                   onmouseup="onSeekRelease()"
                   ontouchend="onSeekRelease()"
                   oninput="updateSeekDisplay(this.value)">
            <span class="seek-time" id="seek-total">0:00</span>
        </div>
    </section>

    <div class="track-list-container">
        <div class="media-tabs">
            <button class="tab-btn active" onclick="switchTab('music')">Music</button>
            <button class="tab-btn" onclick="switchTab('video')">Video</button>
        </div>
        <div id="track-list" class="track-list">
            <!-- Tracks injected here -->
            <div style="text-align:center; padding: 2rem; color: var(--text-dim)">Loading Media Library...</div>
        </div>
    </div>

    <script>
        let currentMediaType = 'music';

        function switchTab(type) {
            currentMediaType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            refreshList();
        }

        async function fetchSongs() {
            try {
                // Also fetch volume on load
                fetchVolume();
                const response = await fetch(`/api/songs?type=${currentMediaType}`);
                const songs = await response.json();
                renderTracks(songs);
            } catch (err) {
                console.error("Failed to load tracks:", err);
            }
        }

        function renderTracks(songs) {
            const container = document.getElementById('track-list');
            if (songs.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 2rem;">No ${currentMediaType} found</div>`;
                return;
            }

            container.innerHTML = songs.map(song => {
                let techStr = '';
                if (song.tech.sample_rate) techStr += (parseInt(song.tech.sample_rate) / 1000) + 'kHz ';
                if (song.tech.bit_rate) techStr += Math.round(parseInt(song.tech.bit_rate) / 1000) + 'kbps';
                if (techStr) techStr = ' • <span style="color:var(--success); font-size: 0.75rem;">' + techStr + '</span>';

                return `
                <div class="track-item" onclick="playTrack('${song.path.replace(/'/g, "\\'")}', '${song.type}')">
                    <div class="track-info">
                        <span class="track-item-title">${song.title}</span>
                        <span class="track-item-sub">
                            <span class="format-tag">${(song.tech.format || 'UNK').toUpperCase()}</span>
                            ${song.artist} • ${song.album}${techStr}
                        </span>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function playTrack(path, type) {
            console.log("Playing:", path, type);
            try {
                const response = await fetch('/api/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path, type: type || currentMediaType })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    updateNowPlaying(data.track);
                    // Reset UI if it was paused
                    document.getElementById('playing-title').style.opacity = "1";
                }
            } catch (err) {
                alert("Failed to play track: " + err);
            }
        }

        async function stopMusic() {
            await fetch('/api/stop', { method: 'POST' });
            document.getElementById('playing-title').innerText = "Stopped";
            document.getElementById('playing-artist').innerText = "";
            document.getElementById('playing-badges').innerHTML = "";
            document.getElementById('playing-title').style.opacity = "1";
        }

        async function pauseMusic() {
            await fetch('/api/pause', { method: 'POST' });
            document.getElementById('playing-title').style.opacity = "0.5";
        }

        async function resumeMusic() {
            await fetch('/api/resume', { method: 'POST' });
            document.getElementById('playing-title').style.opacity = "1";
        }

        function refreshList() {
            document.getElementById('track-list').innerHTML = `<div style="text-align:center; padding: 2rem;">Refreshing...</div>`;
            fetchSongs();
        }

        function updateNowPlaying(track) {
            document.getElementById('playing-title').innerText = track.title;
            document.getElementById('playing-artist').innerText = track.artist;
            
            const badges = document.getElementById('playing-badges');
            badges.innerHTML = '';
            
            const tech = track.tech;
            if (tech.format) badges.innerHTML += `<span class="badge">${tech.format}</span>`;
            
            if (tech.sample_rate) {
                const rate = parseInt(tech.sample_rate) / 1000;
                const isHiRes = rate > 44.1;
                badges.innerHTML += `<span class="badge ${isHiRes ? 'hires' : ''}">${rate} kHz</span>`;
            }
            
            if (tech.bit_depth) badges.innerHTML += `<span class="badge">${tech.bit_depth} bit</span>`;
            if (tech.bit_rate) {
                const kbps = Math.round(parseInt(tech.bit_rate) / 1000);
                badges.innerHTML += `<span class="badge">${kbps} kbps</span>`;
            }
        }

        async function fetchVolume() {
            const response = await fetch('/api/volume');
            const data = await response.json();
            document.getElementById('volume-slider').value = data.volume;
            document.getElementById('volume-value').innerText = data.volume + '%';
        }

        let volumeTimeout;
        async function updateVolume(val) {
            document.getElementById('volume-value').innerText = val + '%';
            
            // Debounce to avoid flooding the server while sliding
            clearTimeout(volumeTimeout);
            volumeTimeout = setTimeout(async () => {
                await fetch('/api/volume', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ volume: val })
                });
            }, 50);
        }

        // Initial Load
        window.onload = fetchSongs;

        // ── Seek Slider ────────────────────────────────
        window.seekDragging = false;
        let currentDuration = 0;

        function formatTime(secs) {
            if (!secs || isNaN(secs)) return '0:00';
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateSeekDisplay(sliderVal) {
            // Called while dragging — just update the current time label
            const pos = (sliderVal / 100) * currentDuration;
            document.getElementById('seek-current').innerText = formatTime(pos);
        }

        async function onSeekRelease() {
            window.seekDragging = false;
            const slider = document.getElementById('seek-slider');
            const position = (slider.value / 100) * currentDuration;
            await fetch('/api/seek', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ position: position })
            });
        }

        async function pollStatus() {
            if (!window.seekDragging) {
                try {
                    const res  = await fetch('/api/status');
                    const data = await res.json();
                    currentDuration = data.duration || 0;

                    const slider = document.getElementById('seek-slider');
                    const pct = currentDuration > 0
                        ? (data.position / currentDuration) * 100
                        : 0;

                    slider.value = pct;
                    document.getElementById('seek-current').innerText = formatTime(data.position);
                    document.getElementById('seek-total').innerText   = formatTime(data.duration);
                } catch (e) { /* socket not ready yet */ }
            }
            setTimeout(pollStatus, 2000);
        }

        pollStatus();
    </script>
</body>
</html>
